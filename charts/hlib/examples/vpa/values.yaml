diagnosticMode:
  # -- Whether to enable diagnostic mode
  enabled: false

vpa:
  # -- Whether to enable the Vertical Pod Autoscaler.
  enabled: true
  # -- VPA update mode (Off, Initial, Recreate, InPlaceOrRecreate, InPlace, Auto).
  updatePolicy:
    updateMode: "Auto"
  # -- Per-container resource policy boundaries.
  resourcePolicy:
    containerPolicies:
      - containerName: "*"
        minAllowed:
          cpu: 50m
          memory: 64Mi
        maxAllowed:
          cpu: "1"
          memory: 512Mi
        controlledResources: ["cpu", "memory"]

# @ignored
deployment:
  container:
    resourceTier: "m100Mi-c100m"
    port: 8080
    image:
      repository: nginx
    livenessProbe:
      tcpSocket:
        port: cont-tcp-port
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 6
    readinessProbe:
      tcpSocket:
        port: cont-tcp-port
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3
