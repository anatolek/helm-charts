diagnosticMode:
  # -- Whether to enable diagnostic mode
  enabled: false

ingress:
  # -- Whether to enable Ingress.
  enabled: false

autoscaling:
  # -- Whether to enable Horizontal Pod Autoscaling.
  enabled: false

serviceAccount:
  # -- Whether to enable Service Account.
  enabled: false

pdb:
  # -- Whether to enable Pod Disruption Budget.
  enabled: false

# @ignored
deployment:
  container:
    resourceTier: "m100Mi-c100m"
    port: 8080
    image:
      repository: nginx
    livenessProbe:
      tcpSocket:
        port: cont-tcp-port
      periodSeconds: 10
      timeoutSeconds: 5
      successThreshold: 1
      failureThreshold: 6
    readinessProbe:
      tcpSocket:
        port: cont-tcp-port
      initialDelaySeconds: 5
      periodSeconds: 5
      timeoutSeconds: 3
      successThreshold: 1
      failureThreshold: 3

init:
  # -- Application username.
  # @section -- Init Application
  username: init
  # -- Application password.
  # @section -- Init Application
  password: "SuperSecretP@ssvv0rd"
