{{- include "hlib.deployment" (dict "context" . "override" "init.deployment") -}}

{{- define "init.deployment" -}}
{{- $env := fromYaml (include "init.deployment.container.env" .) -}}
spec:
  template:
    metadata:
      annotations:
        checksum/secret: {{ include (print .Template.BasePath "/secret.yaml") $ | sha256sum }}
    spec:
      containers:
      - {{- include "hlib.container" (dict "context" . "env" $env "override" "init.deployment.container") }}
{{- end -}}

{{- define "init.deployment.container" -}}
envFrom:
  - secretRef:
      name: {{ include "hlib.fullname" . }}
{{- end -}}
